phase: stage2_feature_engineering

data_source_statement:
  source_condition: uncleaned_source
  note: >
    Stage 2 still starts from the same uncleaned source state, but now allows
    dedicated framework-oriented cleaning and feature engineering because stage 1
    has already shown credible positive signal.

paths:
  lims_path: ../../../data/t90-溴丁橡胶.xlsx
  dcs_main_path: ../../../data/merge_data.csv
  dcs_supplemental_path: ../../../data/merge_data_otr.csv
  artifact_dir: ../artifacts
  report_dir: ../reports

target_spec:
  center: 8.45
  tolerance: 0.25

snapshot:
  lookback_minutes: 120
  min_points_per_window: 5
  stats:
    - mean
    - std
    - min
    - max
    - last
    - delta
    - range
    - slope
    - valid_ratio

cleaning:
  drop_feature_missing_ratio_above: 0.98
  drop_high_corr_threshold: 0.9995

selection:
  high_risk_top_k: 160
  centered_desirability_top_k: 200

validation:
  n_splits: 5

tasks:
  high_risk:
    enabled: true
    threshold: 8.7
  centered_desirability:
    enabled: true

autogluon:
  presets: medium_quality_faster_train
  time_limit_seconds: 180
  verbosity: 1
  hyperparameters:
    GBM: {}
    XGB: {}

baseline:
  binary_model: logistic_regression
  regression_model: ridge
