experiment_name: centered_quality_current_head
branch_stage: first_pass_target_definition

data:
  dcs_main_path: data/merge_data.csv
  dcs_supplemental_path: data/merge_data_otr.csv
  lims_glob: "t90-*.xlsx"

identity_dedup:
  min_shared_rows: 1000
  same_ratio_threshold: 1.0
  atol: 1.0e-12
  prefer_main_column: true

features:
  lookback_minutes: 120
  window_statistics:
    - last
    - mean
    - std
    - min
    - max
    - range
    - delta
  max_missing_ratio: 0.50
  near_constant_ratio: 0.995
  duplicate_fill_value: -999999.0

screening:
  topk_sensors: 40

validation:
  n_splits: 5
  inner_n_splits: 3

labels:
  hard_three_class:
    low: 8.2
    high: 8.7
  cumulative_thresholds:
    - 8.0
    - 8.2
    - 8.7
    - 8.9
  boundary_low:
    - 7.9
    - 8.3
  boundary_high:
    - 8.6
    - 8.8

baseline_reference:
  training_objective:
    weighted_thresholds:
      - 8.2
      - 8.7
    boundary_weight_grid:
      - 1.25
      - 1.50
      - 2.00
      - 3.00
    warning_weight_grid:
      - 1.00
      - 1.25
      - 1.50
      - 2.00
    inner_macro_f1_tolerance: 0.005
    inner_balanced_accuracy_tolerance: 0.005

centered_quality:
  target_center: 8.45
  tolerance_half_width: 0.25
  desirability_form: linear
  center_core_radius: 0.10
  margin_min_distance: 0.20
  premium_true_threshold: 0.80

decision:
  unacceptable_risk_threshold: 0.50
  premium_risk_ceiling: 0.20
  premium_quality_threshold: 0.80
  acceptable_risk_ceiling: 0.35
  acceptable_quality_floor: 0.30

models:
  logistic_max_iter: 2000
  class_weight: balanced
  apply_monotonic_correction: true
  ridge_alpha: 1.0

outputs:
  artifacts_dir: artifacts/centered_quality_current_head
  reports_dir: reports/centered_quality_current_head
