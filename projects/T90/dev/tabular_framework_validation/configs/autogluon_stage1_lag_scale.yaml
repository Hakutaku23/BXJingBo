phase: stage1_lag_scale

data_source_statement:
  source_condition: uncleaned_source
  note: >
    The starting source is uncleaned in the sense of not having gone through a
    systematic project-wide cleaning workflow. Stage 1 adds lag-scale feature
    packages on top of the same causal data source without introducing future leakage.

paths:
  lims_path: ../../../data/t90-溴丁橡胶.xlsx
  dcs_main_path: ../../../data/merge_data.csv
  dcs_supplemental_path: ../../../data/merge_data_otr.csv
  artifact_dir: ../artifacts
  report_dir: ../reports
  stage0_summary_path: ../artifacts/stage0_baseline_summary.json

target_spec:
  center: 8.45
  tolerance: 0.25

snapshot:
  min_points_per_window: 5
  stats:
    - mean
    - std
    - min
    - max
    - last
    - range
    - delta

lag_scale:
  taus:
    - 0
    - 120
    - 240
    - 360
    - 480
  windows:
    - 60
    - 120
    - 240
    - 480

validation:
  n_splits: 5

tasks:
  centered_desirability:
    enabled: true
  five_bin:
    enabled: true
    bins:
      - -.inf
      - 8.0
      - 8.2
      - 8.7
      - 8.9
      - .inf

autogluon:
  presets: medium_quality_faster_train
  time_limit_seconds: 45
  verbosity: 1
  hyperparameters:
    GBM: {}
    XGB: {}

baseline:
  regression_model: ridge
  multiclass_model: multinomial_logistic_regression
