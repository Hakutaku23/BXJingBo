phase: soft_target_centered_x_ablation_round2

data_source_statement:
  source_condition: uncleaned_source
  note: >
    Round 2 confirmatory ablation after the controlled label-X matrix.
    This round freezes the strongest pair from round 1 and decomposes the
    centered-X package into lag, interaction, and quality components.

paths:
  lims_path: ../../../data/t90-溴丁橡胶.xlsx
  dcs_main_path: ../../../data/merge_data.csv
  dcs_supplemental_path: ../../../data/merge_data_otr.csv
  artifact_dir: ../artifacts/soft_target_centered_x_ablation_round2
  report_dir: ../reports/soft_target_centered_x_ablation_round2
  stage1_summary_path: ../artifacts/stage1_lag_scale_summary.json
  stage3_summary_path: ../artifacts/stage3_regime_summary.json
  stage4_summary_path: ../artifacts/stage4_interaction_summary.json
  stage5_summary_path: ../artifacts/stage5_quality_summary.json
  stage6_summary_path: ../artifacts/stage6_centered_quality_summary.json
  stage7_summary_path: ../artifacts/stage7_final_summary.json

target_spec:
  center: 8.45
  tolerance: 0.25

label_fuzziness:
  target_name: target_soft_out_of_spec_probability
  boundary_softness: 0.08
  rule: logistic_boundary_membership

snapshot:
  min_points_per_window: 5
  stats:
    - mean
    - std
    - min
    - max
    - last
    - range
    - delta
    - slope
    - valid_ratio

cleaning:
  drop_feature_missing_ratio_above: 0.98
  drop_high_corr_threshold: 0.9995

validation:
  n_splits: 5

tasks:
  high_risk:
    enabled: false
  centered_desirability:
    enabled: true
  five_bin:
    enabled: true
    bins:
      - -.inf
      - 8.0
      - 8.2
      - 8.7
      - 8.9
      - .inf

selection:
  shared_top_k: 220

preclean:
  max_missing_ratio: 0.98
  near_constant_unique_threshold: 1

quality_feature_map:
  missing_freeze:
    - missing_ratio
    - valid_count
    - freeze_length
    - freeze_ratio
  jump_irregularity:
    - max_jump
    - time_since_last_jump
    - update_irregularity
  combined_quality:
    - missing_ratio
    - valid_count
    - freeze_length
    - freeze_ratio
    - max_jump
    - time_since_last_jump
    - update_irregularity

autogluon:
  presets: medium_quality_faster_train
  time_limit_seconds: 60
  verbosity: 1
  hyperparameters:
    GBM: {}
    XGB: {}
