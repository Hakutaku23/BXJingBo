phase: stage2_soft_out_of_spec_probability_tuning

data_source_statement:
  source_condition: uncleaned_source
  note: >
    This controlled tuning stage still starts from the same uncleaned source
    state. It only performs local optimization around the validated soft
    probability branch and keeps the same leakage-controlled stage-2 workflow.

paths:
  lims_path: ../../../data/t90-溴丁橡胶.xlsx
  dcs_main_path: ../../../data/merge_data.csv
  dcs_supplemental_path: ../../../data/merge_data_otr.csv
  artifact_dir: ../artifacts
  report_dir: ../reports

target_spec:
  center: 8.45
  tolerance: 0.25

label_fuzziness:
  target_name: target_soft_out_of_spec_probability
  boundary_softness: 0.05
  rule: logistic_boundary_membership

snapshot:
  lookback_minutes: 120
  min_points_per_window: 5
  stats:
    - mean
    - std
    - min
    - max
    - last
    - delta
    - range
    - slope
    - valid_ratio

cleaning:
  drop_feature_missing_ratio_above: 0.98
  drop_high_corr_threshold: 0.9995

selection:
  soft_probability_top_k: 200

validation:
  n_splits: 5

autogluon:
  presets: medium_quality_faster_train
  time_limit_seconds: 90
  verbosity: 1
  hyperparameters:
    GBM: {}
    XGB: {}

tasks:
  high_risk:
    enabled: false
    threshold: 8.7
  centered_desirability:
    enabled: false

tuning:
  vary_lookback_minutes:
    - 90
    - 120
    - 150
  vary_boundary_softness:
    - 0.03
    - 0.05
    - 0.08
  vary_top_k:
    - 120
    - 200
    - 280
