phase: centered_model_family_recovery

data_source_statement:
  source_condition: uncleaned_source
  note: >
    This experiment keeps the currently best centered_desirability input recipe
    fixed and only expands the AutoGluon model family pool, to verify whether
    previously skipped model families can provide real gains after the
    environment repair.

paths:
  lims_path: ../../../data/t90-溴丁橡胶.xlsx
  dcs_main_path: ../../../data/merge_data.csv
  dcs_supplemental_path: ../../../data/merge_data_otr.csv
  artifact_dir: ../artifacts
  report_dir: ../reports

target_spec:
  center: 8.45
  tolerance: 0.25

snapshot:
  lag_minutes: 120
  total_window_minutes: 60
  min_points_per_window: 5
  stats:
    - mean
    - std
    - min
    - max
    - last
    - range
    - delta

packages:
  interaction_package: flow_balance
  quality_features:
    - missing_ratio
    - valid_count
    - freeze_length
    - freeze_ratio
    - max_jump
    - time_since_last_jump
    - update_irregularity

validation:
  n_splits: 5

tasks:
  centered_desirability:
    enabled: true
  five_bin:
    enabled: false
    bins:
      - -.inf
      - 8.0
      - 8.2
      - 8.7
      - 8.9
      - .inf

task:
  name: centered_desirability
  label: target_centered_desirability
  top_k: 400

preclean:
  max_missing_ratio: 0.98
  near_constant_unique_threshold: 1

autogluon:
  presets: medium_quality_faster_train
  time_limit_seconds: 75
  verbosity: 1

model_pools:
  - name: gbm_xgb_only
    hyperparameters:
      GBM: {}
      XGB: {}
  - name: expanded_tree_pool
    hyperparameters:
      GBM: {}
      XGB: {}
      CAT: {}
      RF: {}
      XT: {}
  - name: expanded_cpu_pool
    hyperparameters:
      GBM: {}
      XGB: {}
      CAT: {}
      RF: {}
      XT: {}
      NN_TORCH: {}
      FASTAI: {}

baseline:
  regression_model: ridge
