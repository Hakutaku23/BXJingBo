experiment_name: ordinal_cumulative_current_head

data:
  dcs_path: data/merge_data.csv
  lims_glob: "t90-*.xlsx"

features:
  lookback_minutes: 60
  window_statistics:
    - last
    - mean
    - std
    - min
    - max
    - range
    - delta
  max_missing_ratio: 0.50
  near_constant_ratio: 0.995
  duplicate_fill_value: -999999.0

screening:
  topk_sensors: 40
  score_target: out_of_spec

validation:
  n_splits: 5
  min_splits: 3

labels:
  hard_three_class:
    low: 8.2
    high: 8.7
  cumulative_thresholds:
    - 8.0
    - 8.2
    - 8.7
    - 8.9
  boundary_low:
    - 7.9
    - 8.3
  boundary_high:
    - 8.6
    - 8.8

models:
  logistic_max_iter: 2000
  class_weight: balanced
  apply_monotonic_correction: false
  interval_negative_handling: clip_and_renormalize

outputs:
  artifacts_dir: artifacts
  reports_dir: reports
