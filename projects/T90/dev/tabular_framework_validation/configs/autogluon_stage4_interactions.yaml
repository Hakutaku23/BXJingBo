phase: stage4_interactions

data_source_statement:
  source_condition: uncleaned_source
  note: >
    The starting source is uncleaned in the sense of not having gone through a
    systematic project-wide cleaning workflow. Stage 4 adds a limited process-interaction
    feature pack on top of the current best validated inputs without introducing future leakage.

paths:
  lims_path: ../../../data/t90-溴丁橡胶.xlsx
  dcs_main_path: ../../../data/merge_data.csv
  dcs_supplemental_path: ../../../data/merge_data_otr.csv
  signal_reference_path: ../../../data/卤化点位.xlsx
  artifact_dir: ../artifacts
  report_dir: ../reports
  stage1_summary_path: ../artifacts/stage1_lag_scale_summary.json
  stage3_summary_path: ../artifacts/stage3_regime_summary.json

target_spec:
  center: 8.45
  tolerance: 0.25

snapshot:
  min_points_per_window: 5
  stats:
    - mean
    - std
    - min
    - max
    - last
    - range
    - delta

validation:
  n_splits: 5

tasks:
  centered_desirability:
    enabled: true
  five_bin:
    enabled: true
    bins:
      - -.inf
      - 8.0
      - 8.2
      - 8.7
      - 8.9
      - .inf

regime_fallback:
  include_best_stage3_state_if_positive: true

interaction_packages:
  - name: reactor_balance
  - name: flow_balance
  - name: thermal_coupling
  - name: combined_core

autogluon:
  presets: medium_quality_faster_train
  time_limit_seconds: 45
  verbosity: 1
  hyperparameters:
    GBM: {}
    XGB: {}

baseline:
  regression_model: ridge
  multiclass_model: multinomial_logistic_regression
