phase: stage2_soft_out_of_spec_probability_feature_distillation

data_source_statement:
  source_condition: uncleaned_source
  note: >
    This experiment tests whether the current best X-side feature family should
    be distilled before model fitting. It keeps the validated soft Y design
    fixed and only compares compact feature subsets against the full
    range-position family.

paths:
  lims_path: ../../../data/t90-溴丁橡胶.xlsx
  dcs_main_path: ../../../data/merge_data.csv
  dcs_supplemental_path: ../../../data/merge_data_otr.csv
  artifact_dir: ../artifacts
  report_dir: ../reports

target_spec:
  center: 8.45
  tolerance: 0.25

label_fuzziness:
  target_name: target_soft_out_of_spec_probability
  boundary_softness: 0.08
  rule: logistic_boundary_membership

snapshot:
  lookback_minutes: 120
  min_points_per_window: 5
  stats:
    - mean
    - std
    - min
    - max
    - last
    - delta
    - range
    - slope
    - valid_ratio

cleaning:
  drop_feature_missing_ratio_above: 0.98
  drop_high_corr_threshold: 0.9995

selection:
  soft_probability_top_k: 220

validation:
  n_splits: 5

tasks:
  high_risk:
    enabled: false
    threshold: 8.7
  centered_desirability:
    enabled: false

autogluon:
  presets: medium_quality_faster_train
  time_limit_seconds: 45
  verbosity: 1
  hyperparameters:
    GBM: {}
    XGB: {}

distillation:
  variants:
    - base_core
    - range_position_full
    - range_position_distilled_minimal
    - range_position_distilled_single
