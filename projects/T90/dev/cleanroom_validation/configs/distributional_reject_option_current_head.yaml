experiment_name: distributional_reject_option_current_head
branch_stage: baseline_b_only

data:
  dcs_main_path: data/merge_data.csv
  dcs_supplemental_path: data/merge_data_otr.csv
  lims_glob: "t90-*.xlsx"

identity_dedup:
  min_shared_rows: 1000
  same_ratio_threshold: 1.0
  atol: 1.0e-12
  prefer_main_column: true

features:
  lookback_minutes: 120
  window_statistics:
    - last
    - mean
    - std
    - min
    - max
    - range
    - delta
  max_missing_ratio: 0.50
  near_constant_ratio: 0.995
  duplicate_fill_value: -999999.0

screening:
  topk_sensors: 40

validation:
  n_splits: 5
  inner_n_splits: 3
  min_splits: 3

labels:
  hard_three_class:
    low: 8.2
    high: 8.7
  cumulative_thresholds:
    - 8.0
    - 8.2
    - 8.7
    - 8.9
  boundary_low:
    - 7.9
    - 8.3
  boundary_high:
    - 8.6
    - 8.8

models:
  logistic_max_iter: 2000
  class_weight: balanced
  apply_monotonic_correction: true

training_objective:
  weighted_thresholds:
    - 8.2
    - 8.7
  boundary_weight_grid:
    - 1.25
    - 1.50
    - 2.00
    - 3.00
  warning_weight_grid:
    - 1.00
    - 1.25
    - 1.50
    - 2.00
  inner_macro_f1_tolerance: 0.005
  inner_balanced_accuracy_tolerance: 0.005

distributional:
  bin_names:
    - bin_1
    - bin_2
    - bin_3
    - bin_4
    - bin_5
  bin_edges:
    - 8.0
    - 8.2
    - 8.7
    - 8.9
  soft_inner_thresholds:
    - 8.2
    - 8.7
  soft_radius: 0.05
  entropy_log_epsilon: 1.0e-12

outputs:
  artifacts_dir: artifacts/distributional_reject_option_current_head_baseline_b
  reports_dir: reports/distributional_reject_option_current_head_baseline_b
